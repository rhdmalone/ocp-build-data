content:
  source:
    dockerfile: Dockerfile.rhel8
    git:
      branch:
        target: release-{MAJOR}.{MINOR}
      url: git@github.com:openshift-priv/cluster-node-tuning-operator.git
      web: https://github.com/openshift/cluster-node-tuning-operator
    modifications:
    - action: replace
      match: "gcc git rpm-build make desktop-file-utils patch dnf-plugins-core"
      replacement: "gcc rpm-build make desktop-file-utils patch dnf-plugins-core"
    pkg_managers:
    - gomod
    ci_alignment:
      streams_prs:
        ci_build_root:
          stream: rhel-8-golang-ci-build-root
enabled_repos:
- rhel-8-baseos-rpms
- rhel-8-appstream-rpms
- rhel-8-fast-datapath-rpms
- rhel-8-server-ose-rpms-embargoed
for_payload: true
