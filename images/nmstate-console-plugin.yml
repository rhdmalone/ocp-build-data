envs:
  CYPRESS_INSTALL_BINARY: "0"
content:
  source:
    dockerfile: Dockerfile.art
    git:
      branch:
        target: release-{MAJOR}.{MINOR}
      url: git@github.com:openshift-priv/nmstate-console-plugin.git
      web: https://github.com/openshift/nmstate-console-plugin
    modifications:
    - action: replace
      match: "./artifacts/yarn-${YARN_VERSION}.tar.gz"
      replacement: "/cachi2/output/deps/generic/yarn-${YARN_VERSION}.tar.gz"
    ci_alignment:
      streams_prs:
        ci_build_root:
          stream: rhel-8-golang-ci-build-root
    pkg_managers:
    - yarn
dependents:
- openshift-kubernetes-nmstate-operator
enabled_repos:
- rhel-8-baseos-rpms
- rhel-8-appstream-rpms
for_payload: false
from:
  builder:
  - member: openshift-base-nodejs
  member: openshift-enterprise-base
name: openshift/nmstate-console-plugin-rhel8
owners:
- upalatuc@redhat.com
- bnemec@redhat.com
- yzamir@redhat.com
- phoracek@redhat.com
- fge@redhat.com
delivery:
  delivery_repo_names:
  - openshift4/nmstate-console-plugin-rhel8
name_in_bundle: nmstate-console-plugin-rhel8
konflux:
  cachito:
    mode: removal
  cachi2:
    lockfile:
      modules:
      - nginx:1.24
    artifact_lockfile:
      resources:
      - url: https://ocp-artifacts.engineering.redhat.com/pub/RHOCP/build-deps/openshift-enterprise-console/yarn-v1.22.19.tar.gz
