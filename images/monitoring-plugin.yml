envs:
  CYPRESS_INSTALL_BINARY: "0"
content:
  source:
    dockerfile: Dockerfile.art
    git:
      branch:
        target: release-{MAJOR}.{MINOR}
      url: git@github.com:openshift-priv/monitoring-plugin.git
      web: https://github.com/openshift/monitoring-plugin
    ci_alignment:
      streams_prs:
        ci_build_root:
          stream: rhel-8-golang-ci-build-root
    modifications:
    - action: replace
      match: "./artifacts/yarn-${YARN_VERSION}.tar.gz"
      replacement: "/cachi2/output/deps/generic/yarn-${YARN_VERSION}.tar.gz"
    pkg_managers:
    - yarn
distgit:
  branch: rhaos-{MAJOR}.{MINOR}-rhel-8
  component: monitoring-plugin-container
enabled_repos:
- rhel-8-appstream-rpms
- rhel-8-baseos-rpms
for_payload: true
from:
  builder:
  - stream: nodejs
  member: openshift-enterprise-base
name: openshift/ose-monitoring-plugin-rhel8
payload_name: monitoring-plugin
owners:
- team-observability-ui@redhat.com
konflux:
  cachito:
    mode: removal
  cachi2:
    lockfile:
      modules:
      - nginx:1.24
    artifact_lockfile:
      resources:
      - url: https://ocp-artifacts.engineering.redhat.com/pub/RHOCP/build-deps/openshift-enterprise-console/yarn-v1.22.19.tar.gz
delivery:
  delivery_repo_names:
  - openshift4/ose-monitoring-plugin-rhel8
